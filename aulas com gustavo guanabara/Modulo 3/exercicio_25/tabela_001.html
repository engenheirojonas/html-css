<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <STYle>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;

            /*unifica a borda direita e 
            esquerda de dois tr para formar apenas uma linha
            o valor padrao é separated*/
            border-collapse: collapse;
        }

        tr.linha {
            background-color: wheat;
        }

        td {
            border: 1px solid black;
            padding: 8px;
        }

        td.dado {
            background-color: rgb(0, 252, 42);
        }
    </STYle>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    
    <!--
        hierarquia de tabelas (simples)
        table = tabela
            table row = linha de tabela
                table header = cabeçalho de tabela
                table data = dado de tabela, e isso é que forma o que chamamos  de coluna
    -->
    
    <table>
        <!--primeira linha-->
        <tr>
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr class="linha">
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <td>A4</td>
            <td>B4</td>
            <td class="dado">C4</td>
        </tr>
        <tr>
            <td>A5</td>
            <td>B5</td>
        </tr>
        <tr>
            <td>A6</td>
        </tr>
       
    </table>

    <h1>Minha tabela experimental</h1>

     <table>
        <!--primeira linha-->
        <tr>
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td class="dado"></td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <td class="dado"></td>
            <td class="dado"></td>
            <td>C4</td>
        </tr>
      
    
    
</body>
</html>
