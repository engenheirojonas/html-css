<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <STYle>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        td, th {
            border: 1px solid black;
            padding-block-start: 10px;
            
        }

        thead, tfoot {
            background-color: gray;
            color: white;
        }

        .num {
            text-align: right;
        }

        .numTotal {
            text-align: center;
        }

    </STYle>
</head>
<body>
    <h1>Anatomia de tabelas grandes</h1>

    <!--tags semantica para tabelas
    Anatomia duma tabela semantica
    
    table
        thead
            tr
                td      - td representa dado
                th      - th representa titulo
        tbody
            tr
                td      - td representa dado
                th      - th representa titulo
        tfoot
            tr
                td      - td representa dado
                th      - th representa titulo
    -->
    
    <table>
        <thead>
            <tr>
                <th>Estado</th>
                <th>Populaçao</th>
            </tr>

        </thead>

        <tbody>
            <tr>
                <td>Sao paulo</td>
                <td class="num">45 919 049</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21 168 791</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">17 284 943</td>
            </tr>
            <tr>
                <td>Sao paulo</td>
                <td class="num">45 919 049</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21 168 791</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">17 284 943</td>
            </tr>
            <tr>
                <td>Sao paulo</td>
                <td class="num">45 919 049</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21 168 791</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">17 284 943</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th>Total de habitantes</th>
                <td class="numTotal"><strong>1.000.0000.000</strong></td>
            </tr>
        </tfoot>
    </table>



</body>
</html>
