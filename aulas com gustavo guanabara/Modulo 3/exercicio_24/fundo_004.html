<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento 2 dos fundos</title>
    <style>
        body {
            /*o valor vh é a medida do tamanho da view porte para 
            altura do view porte
            o valor vw é a medida do tamanho da view porte para 
            a largura*/
            height: 98vh;
            
            border: 1px dashed black;
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            background-size: 100px 100px;
            background-repeat: no-repeat;

             /* o valor pode ser 
            left center
            left top
            left bottom
            center top
            center center
            center bottom
            right top
            right center
            right bottom
            */
            background-position: center center;
        }
        
        
    </style>
