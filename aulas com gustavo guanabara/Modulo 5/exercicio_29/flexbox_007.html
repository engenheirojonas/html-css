<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <StyLe>

        /*FLEX BOX

                FLEX CONTAINER

         configuraçoes somente para o container ou o pai
         
        */

        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: lightsalmon;
        }

        main {
            background-color: lightgreen;
            height: 100vh;
            width: 100vw;

            /*primeiro passo para usar flex box*/
            display: flex;
            flex-flow: row nowrap;

            /*dentro do main, a minha tela de login (section) sempre ficará centralizado*/
            justify-content: center;
            align-items: center;

        }

        section {
            background-color: lightseagreen;
            height: 200px;
            width: 200px;
        }
        
    </StyLe>
</head>
<body>
    <main>
        <section>
            <h1>Tela de login</h1>
        </section>
    </main>
</body>
</html>
