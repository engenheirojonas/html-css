<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <StyLe>

        /*FLEX BOX

                FLEX CONTAINER
        
        quando alterares o tamanho do navegador os items (filho) serao vao se adaptar dentro do container (pai) ou ser fluido
        
        somente o container tem o recebe a configuraçao display flex

        o item tem o flex auto
        ou outras configuraçoes
        */

     
        div.container {
            background-color: lightsalmon;

            /*o container tem o display flex*/
            display: flex;
        }
        div.item {
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;

            /*o item tem o flex auto
            nao permite que tenha espaço branco dentro do elemento pai ou o container*/
            flex: auto;
        }

    </StyLe>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
    </div>
</body>
</html>
