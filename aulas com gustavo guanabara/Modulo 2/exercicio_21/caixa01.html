<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>


    <style>

        /*
        caixas box-level
        h1, div, p, ... 

        caixas in-level
        span, a, i, ...

        mas a propriedade display pode reconfigurar los, valor block para caixas box level que tambem podem ser definidos com valor inline
        e o mesmo com as caixas in-level

        /*podemos visualizar e analizar as caixas com google chrome no menu inspecionar*/

        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-style: solid;
            border-color: darkgrey;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 1px;
            padding-left: 10px;

            /*shorthand do padding
            
            uma shorthand geralmente serve para simplificar um monte de declaraçao

            
            padding: top right bottom left
            padding: 10px 10px 10px 10px;

            se os tamnhos forem iguais informaremos apenas um valor
            padding: 10px;

            se metermos 2 valores, o primeiro valor sera pra definir top e bottom, e o segundo valor sera pra definir o right e left

            padding: 10px;
            
            */

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 100px;
            margin-left: 10px;

            /*
            shorthand
                funciona como short hand pra padding

            margin: auto; 
                o valor auto desta propriedade centraliza a caixa e repositiona ou justifica a com o tamanho da tela do seu navegador mas de é para o texto a propriedade e o valor é text-align:center
                e como é só um valor, top, right bottom e left igualem a este valor

             margin: 10px auto; 
                isto significa, top e bottom sao iguais ao valor 10, e right e left igualem ao valor auto



            */

            outline-width: 10px;
            outline-style: dashed;
            outline-color: brown;

            /*short hand
            outline: 10px dashed brown;
            */

        }

        a {
            border-color: rgb(19, 16, 16);
            border-style: dotted; /*solid, double*/
            border-width: 5px;

            /*shorthand
            
            border: 5px dashed rgb(19, 16, 16);
            
            */

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }

    </style>

</head>
<body>
    <h1>exemplo de caixa box-level</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aliquid eveniet iure voluptatum vero sit blanditiis autem, earum id natus. <a href="#">Velit debitis</a> eius sint possimus corrupti sed reiciendis hic eos distinctio!</p>
</body>
</html>
