<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradientes em css</title>

    <Style>

        * {
                /* o simbolo * como seletor css quer dizer Configuraçao global das css*/
            height: 100%;
        }

        body {
            background-image: linear-gradient(to right, white, blue);

            /*podemos tambem
                 background-image: linear-gradient(to top, white, blue);

                  background-image: linear-gradient(to left, white, blue);
            */

            /*isso pra nao apresentar outra cor no navegador dalem daquilo que definimos nos color mesmo rolando*/

            background-attachment: fixed;

        }
            
    </Style>


</head>
<body>
    
</body>
</html>
