<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <Style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </Style>
</head>
<body>
    <!-- 
           outros input     
    -->
    
    <h1>Controles de formularios</h1>

    <form action="form_004-cadastro.php" method="post" autocomplete="on">
        <p>
            <!--cor padrao colocado por nós com atributo value-->
            <label for="id_cor">Cor:</label>
            <input type="color" name="cor" id="id_cor" 
            value="#00ff00">
        </p>
        <p>
            
            <!--os atributos:
            min="1" max="5" value="2"-->
            <label for="id_nivel">Nivel de Satisfação</label>
            <input type="range" name="nivel" id="id_nivel" 
            
            min="1" max="5" value="2">
        </p>

        <!--Quando usammos o input do type file
        devemos meter "post" como "method" da form porque geralmente os ficheiros tem mais de 3000 bits, pelo que devemos usar post e nao get-->
        <p>
            <label for="id_foto">Foto do Perfil</label>
            <input type="file" name="foto" id="id_foto">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>

</body>
</html>
