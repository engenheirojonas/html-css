<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <Style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </Style>
</head>
<body>
    <!-- LISTAS

           Select
                mostra uma lista definitivo de items,  listado apenas pelo programador

           datalist
                mostra uma lista definitivo de items, que pode incluir tambem items inseridos pelo proprio usuario
            
            Mensagem
                permite ao usuario inserir ou digitar textos
    -->
    
    <h1>Controles de formularios</h1>

    <form action="form_004-cadastro.php" method="post" autocomplete="on">

                <!-- 
           Select   
                 -->
    
        <p>
            <label for="id_estado">Estado</label>
            <select name="estado" id="id_estado">
                <option value="Aoa">Angola</option>
                <option value="RPC">Congo</option>
                <option value="RDC">RDC</option>
            </select>
        </p>

         <p>
            <label for="id_estado2">Estados do Mundo</label>
            <select name="estado" id="id_estado2">

                <option value="" seleceted>---Escolha o estado----</option>

                <optgroup label="Africra">
                    <option value="Aoa">Angola</option>
                    <option value="RPC">Congo</option>
                    <option value="RDC">RDC</option>
                </optgroup>

                <optgroup label="Outros Continentes">
                    <option value="Deutsch">Alemanhã</option>
                    <option value="Mon">Monaco</option>
                    <option value="EUA">EUA</option>
                </optgroup>
            </select>
        </p>

                <!-- 
           datalist
                -->
        <p>
            <label for="id_prof">Profissão</label>
            <input type="text" name="prof" id="id_prof" list="listprof">
            <datalist id="listprof">
                <option value="adm">Administrador</option>
                <option value="cont">Contabilista</option>
                <option value="dev">Desenvolvedor</option>
                <option value="prof">Professor</option>
            </datalist>
        </p>

        <p>
            <label for="id_prof2">Profissão</label>
            <input type="text" name="prof" id="id_prof2" list="listprof2">
            <datalist id="listprof2">
                <option>Administrador</option>
                <option>Contabilista</option>
                <option>Desenvolvedor</option>
                <option>Professor</option>
            </datalist>
        </p>

                 <!-- 
           Msg (Mensagens)
                    para usarmos a tag "textarea" devemos usat o method "post" no form, para nao ter limitaçoes, pois o method "get" só aceita 3000 bits.
                    
                    o atributo "cols" do elemento ou tag "textarea" mostra numero de cararcter antes de quebrar de linha consoante o usuario vai digitando
           -->

        <p>
            <label for="id_msg">Mensagem</label><br>
            <textarea name="msg" id="id_msg" cols="30" rows="10"></textarea>
        </p>


        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>

</body>
</html>
