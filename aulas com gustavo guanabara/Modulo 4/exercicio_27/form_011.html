<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <Style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </Style>
</head>
<body>

    <!--
                Output 2
    
    -->
    
    <h1>Controles de formularios</h1>



    <form action="form_004-cadastro.php" method="post" autocomplete="on">

        <p>
            arraste para selecionar o nivel
        </p>
        <p>
        <label for="id_ano">Em que ano você nasceu?</label>

            <input type="number" name="ano" id="id_ano" min="1950" max="2020" value="2000"
            
            Oninput="calcIdade()">

        </p>
        <p>
            <label for="id_idade">Sua idade é:</label>
            <output id="id_idade">0</output>
        </p>
     



        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>

    <script>
            function calcIdade() {
                let atual=new Date().getFullYear()
                id_idade.innerHTML = Number(atual) - Number(id_ano.value)
            }
    </script>

</body>
</html>
