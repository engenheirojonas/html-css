<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">

    <!--https://developers.google.com/fonts/docs/material_icons?hl=pt-br-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!--A imagem foi inserido apartir das css-->
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar a sua conta e poder fazer as configuraçoes no seu ambiente</p>
          
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-icons">person</span>
                        <input type="email" name="login" id="id_login" placeholder="email" autocomplete="email" required maxlength="30">
                        <label for="id_login">Email:</label>
                    </div>
                    <div class="campo">
                        <span class="material-icons">vpn_key</span>
                        <input type="password" name="senha" id="id_pw" placeholder="Entre sua senha" autocomplete="current-password" required minlength="8" maxlength="20">
                        <label for="id_pw">Senha:</label>
                    </div>
                    <input type="submit" value="Entrar">
                    <a class="btn" href="#">
                        Esqueci a Senha <span class="material-icons">mail</span>
                    </a>
                </form>
            </div>
        </section>
    </main>
    
</body>
</html>
