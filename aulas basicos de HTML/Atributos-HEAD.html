<!DOCTYPE html>
<html lang="en">
<head>
    <title>Atributos do Elemento Meta</title>
    <meta charset="UTF-8">



        <!--Muitos elementos <meta> incluem atributos de name e content: 
            O name
                especifica o tipo de elemento meta que é, que tipo de informação contém. 
            O content 
                especifica o conteúdo real do meta.
        -->

                <!--isso é automatico-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


                <!-- Mas isso inserimos manualmente-->
    <meta name="author" content="Jonas Sambo" /> 

    <meta 
        name="description" 
        content=
            "A Área de Aprendizagem do MDN tem como objetivo proporcionar iniciantes em Web com tudo o que eles precisam saber para começar a desenvolver sites e aplicativos." 
    />




                <!--Favicon basico
                        ctrl + barra de espaçamento
                        Salvando-o no mesmo diretório que a página de índice do site, salvo no formato .ico (a maioria dos navegadores suportará favicons em formatos mais comuns como .gif ou .png, mas usar o formato ICO irá garantir que ele funcione tão bem como o Internet Explorer 6 .) -->
    <link rel="shortcut icon" href="Eu.jpg" type="image/x-icon" /> 

                    <!-- Favicon especializado para iPad de terceira geração com tela retina de alta resolução: --> 
    <link rel="apple-touch-icon-precomposed" sizes="144x144" href="Eu.jpg" /> 

                    <!-- Favicon especializado para iPhone com tela retina de alta resolução: --> 
    <link rel="apple-touch-icon-precomposed" sizes="114x114" href="favicon114.png" /> 

                    <!-- Favicon especializado para iPad de primeira e segunda geração: --> 
    <link rel="apple-touch-icon-precomposed" sizes="72x72" href="favicon72.png" /> 

                    <!-- Favicon especializado para iPhone não-Retina, iPod Touch e dispositivos Android 2.1+: --> 
    <link rel="apple-touch-icon-precomposed" href="favicon57.png" /> 

</head>
<body>
    
</body>
</html>
