<!DOCTYPE html>

<body>

    <h1>Sobrescrito e subscrito </h1>

            <!--Ocasionalmente, você precisará usar sobrescrito e subscrito ao marcar itens como datas, fórmulas químicas e equações matemáticas para que eles tenham o significado correto. Os elementos <sup> e <sub> manipulam esse trabalho. Por exemplo:-->
    <p>
        My birthday is on the 25<sup>th</sup> of May 2001.
    </p> 

    <p> 
        Caffeine's chemical formula is C<sub>8</sub>H<sub>10</sub>N<sub>4</sub>O<sub>2</sub>. 
    </p> 

    <p>
        If x<sup>2</sup> is 9, x must equal 3 or -3.
    </p> 

</body>
</html>
