             <!-- <abbr> é usado para contornar uma abreviação ou sigla e fornecer uma expansão completa do termo (incluído em um atributo title.Elas aparecerão da seguinte forma (a expansão aparecerá em uma dica de ferramenta quando o termo passar o mouse):
            isto é usado para abreviaçoes como para acronimos-->
            
    <p>
        Usamos <abbr title="Hypertext Markup Language">HTML</abbr> para estruturar nossos documentos da web.
    </p> 

    <p>
        Acho que o <abbr title="Reverendo">Rev.</abbr> Green fez isso na cozinha com a motosserra.

        </p> 
    </address>
