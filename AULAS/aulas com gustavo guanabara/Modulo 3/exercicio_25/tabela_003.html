<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <STYle>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            padding: 8px;
            

            /*os dados podem ficar a direita ou esquerda ou centro
            
            este é alinhamento horizontal*/
            text-align: center;

            /*podemos combinar o alinhamento do text-align com esta declaraçao
            com valores top ou bottom etc. 
            
            este é alinhamento vertical*/
            vertical-align: top;
        }

        .numero {
            text-align: right;
            vertical-align: middle;
        }



        
    </STYle>
</head>
<body>
    <h1>Anatomia de tabelas grandes</h1>

    <!--tags semantica para tabelas-->

    <table>
        <!--primeira linha-->
        <tr>
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>

        <!--segunda linha-->
        <tr>
            <td>A2</td>
            <td>B2</td>
            <td class="numero">C2</td>
        </tr>

        <!--terceira linha-->
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td class="numero">C3</td>
        </tr>
        <!--quarta linha-->
        <tr>
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>





    <h1>Minha tabela experimental</h1>

     <table>
        <tr>
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td class="dado"></td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <td class="dado"></td>
            <td class="dado"></td>
            <td>C4</td>
        </tr>
      
    
    
</body>
</html>
