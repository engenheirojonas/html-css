<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Queries</title>

    <!--Aqui começa as chamadas Médias Queries-->

    <!--estas são as medias features
    
    quando usamos media, podemos informar, media types e media features.

    as media features sao escritos entre parentes.

    podemos ter uma ou mais de 2 media features numa media

    exemplo dum media feature

    (orientation:portrait)

    praticando

    <link rel="stylesheet" href="estilos/style.css" media="all">

    -->

    <link rel="stylesheet" href="estilos/style.css" media="all">
    <link rel="stylesheet" href="estilos/retrato.css" media="screen and (orientation:portrait)"> 
    <link rel="stylesheet" href="estilos/paisagem.css" media="screen and (orientation:landscape)"> 

</head>
<body>
    <h1>Mude a orientaçao do seu dispositivo</h1>
</body>
</html>
