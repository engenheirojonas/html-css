<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframes</title>
    <style>

        /**/
        iframe {
            width: 500px;
            height: 500px;
            border: 1px dashed black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso dum Iframe</h1>

    <!--Iframe
    é um quadro em forma duma janela ou porta que da acesso a um outro site
    
    tamanho padrao dum iframe 300 de altura e 150 de largura

    mas podemos modificar dentro das tags, porem a configuraçao css do iframe prevalece sempre mesmo se as tags tem as mesmas configuraçoes com outros valores
    -->
    <p>
        acessando o site do
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500">

                <!--caso o teu navegador nao apresentar o iframe vai entao apresentar este link-->
            <a href="https://www.cursoemvideo.com"> Curso em video</a>
        </iframe>
        para aprender a programar
    </p>

    
    
    o repositorio do jonas no
    
    <iframe src="https://engenheirojonas.github.io" frameborder="0" height="500" width="500">

                <!--caso o teu navegador nao for mesmo compativel com o iframe vai entao apresentar este link-->
            <a href="https://engenheirojonas.github.io"></a>
    </iframe>
    
    tambem é bem legal
    
</body>
</html>
